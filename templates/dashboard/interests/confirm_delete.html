{% extends "dashboard/base.html" %}
{% block title %}{{ dash.delete }}{% endblock %}
{% block mobile_title %}{{ dash.delete }}{% endblock %}

{% block content %}
<div class="mx-auto max-w-lg">
  <div class="rounded-2xl border border-red-400/20 bg-[#111827] p-8 shadow-card">
    <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-red-500/15 text-red-400">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    </div>
    <h1 class="mt-4 text-xl font-bold text-white">{{ dash.confirm_delete }}</h1>
    <p class="mt-2 text-sm text-slate-400">{{ dash.delete_int_ask }} «<span class="font-medium text-slate-200">{{ display_label }}</span>»</p>

    <form method="post" class="mt-8 flex flex-wrap gap-3">
      {% csrf_token %}
      <button type="submit" class="inline-flex flex-1 items-center justify-center rounded-xl bg-red-500 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-red-600 sm:flex-none">{{ dash.delete_confirm_yes }}</button>
      <a href="{% url 'dashboard:interests' %}" class="inline-flex flex-1 items-center justify-center rounded-xl border border-slate-600 px-5 py-3 text-sm font-medium text-slate-300 hover:bg-slate-800 sm:flex-none">{{ dash.cancel }}</a>
    </form>
  </div>
</div>
{% endblock %}
