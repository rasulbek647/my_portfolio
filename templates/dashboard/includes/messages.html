{% if messages %}
<div class="mb-6 space-y-2" x-data="{ show: true }">
  {% for message in messages %}
  <div
    role="alert"
    class="flex items-start gap-3 rounded-xl border px-4 py-3 shadow-soft {% if message.tags == 'success' %}border-secondary/40 bg-secondary/10 text-secondary{% elif message.tags == 'error' %}border-red-400/40 bg-red-500/10 text-red-300{% else %}border-slate-600 bg-slate-800/50 text-slate-200{% endif %}"
  >
    {% if message.tags == 'success' %}
    <svg class="mt-0.5 h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    {% elif message.tags == 'error' %}
    <svg class="mt-0.5 h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    {% else %}
    <svg class="mt-0.5 h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    {% endif %}
    <p class="text-sm font-medium">{{ message }}</p>
  </div>
  {% endfor %}
</div>
{% endif %}
