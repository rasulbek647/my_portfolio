{% if tag == "a" %}
<a href="{{ href|default:'#' }}" class="inline-flex items-center justify-center rounded-xl bg-primary px-6 py-3 text-sm font-semibold text-white shadow-soft transition hover:bg-primary-dark active:scale-[0.99] {{ extra_class }}">{{ label }}</a>
{% else %}
<button type="{{ html_type|default:'button' }}" class="inline-flex items-center justify-center rounded-xl bg-primary px-6 py-3 text-sm font-semibold text-white shadow-soft transition hover:bg-primary-dark active:scale-[0.99] {{ extra_class }}">{{ label }}</button>
{% endif %}
