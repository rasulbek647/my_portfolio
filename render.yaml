databases:
  - name: my-portfolio-db
    plan: free
    databaseName: my_portfolio
    user: my_portfolio

services:
  - type: web
    name: my-portfolio
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2
      - key: SERVE_MEDIA
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: my-portfolio-db
          property: connectionString
